<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#09090f;color:#e8e6df;min-height:100vh;font-size:14px}
.hero{padding:32px 24px 20px;border-bottom:1px solid #1e1e2a}
.hero h1{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px}
.hero p{color:#555;font-size:12px}
.main{padding:20px 24px;max-width:900px}
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.section-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.icon-blue{background:#1c3a6e}
.icon-purple{background:#2d1f5e}
.icon-gray{background:#1e1e2a}
.section-title{font-size:13px;font-weight:500;color:#aaa}
.card{background:#12121a;border:1px solid #1e1e2a;border-radius:12px;padding:18px;margin-bottom:12px}
label{display:block;font-size:11px;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;margin-top:14px}
label:first-child{margin-top:0}
input,textarea,select{width:100%;background:#09090f;border:1px solid #1e1e2a;border-radius:8px;padding:9px 12px;color:#e8e6df;font-size:13px;outline:none;font-family:inherit;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:#7c6af7}
input::placeholder,textarea::placeholder{color:#333}
textarea{resize:vertical;min-height:52px;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.crow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.crow input{flex:1}
.rm{background:none;border:1px solid #1e1e2a;border-radius:7px;color:#444;cursor:pointer;width:32px;height:36px;font-size:16px;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.rm:hover{border-color:#ef4444;color:#ef4444}
.add{background:none;border:1px dashed #1e1e2a;border-radius:8px;color:#444;cursor:pointer;padding:8px;font-size:12px;width:100%;text-align:center;transition:all .15s}
.add:hover{border-color:#7c6af7;color:#7c6af7}
.generate-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:linear-gradient(135deg,#6c5ce7,#7c6af7);color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;letter-spacing:.2px;transition:opacity .2s}
.generate-btn:disabled{opacity:.4;cursor:not-allowed}
.generate-btn:not(:disabled):hover{opacity:.9}
#log{background:#06060e;border:1px solid #1e1e2a;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;line-height:1.9;margin-top:14px;display:none;max-height:150px;overflow-y:auto}
.ok{color:#22c55e}.er{color:#ef4444}.in{color:#7c6af7}.dm{color:#333}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Results */
#results{display:none;padding:0 24px 32px;max-width:900px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:20px;border-top:1px solid #1e1e2a}
.results-title{font-size:16px;font-weight:600}
.dla{background:#12121a;border:1px solid #1e1e2a;border-radius:8px;padding:9px 16px;color:#888;font-size:12px;cursor:pointer;transition:all .15s}
.dla:hover{border-color:#7c6af7;color:#7c6af7}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
.sc{background:#12121a;border:1px solid #1e1e2a;border-radius:10px;overflow:hidden;transition:all .2s;cursor:pointer}
.sc:hover{border-color:#7c6af7;transform:translateY(-2px)}
.prev{width:100%;aspect-ratio:390/844;background:#06060e;overflow:hidden;position:relative}
.prev svg{width:100%;height:100%}
.meta{padding:10px}
.mt{font-size:11px;font-weight:500;color:#ccc;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl{width:100%;background:#09090f;border:1px solid #1e1e2a;border-radius:6px;padding:6px;font-size:11px;color:#666;cursor:pointer;transition:all .15s}
.dl:hover{border-color:#7c6af7;color:#7c6af7}

/* Tooltip/badge */
.badge{display:inline-flex;align-items:center;gap:4px;background:#1c3a6e;color:#60a5fa;font-size:10px;padding:3px 8px;border-radius:20px;margin-left:8px;font-weight:500}
</style>
</head>
<body>

<div class="hero">
  <h1>Screenshot Cloner <span class="badge">✦ ASO</span></h1>
  <p>Génère des screenshots App Store optimisés en analysant la concurrence — propulsé par Claude</p>
</div>

<div class="main">

  <!-- Mon app -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-blue">🎯</div>
      <span class="section-title">Mon app</span>
    </div>
    <div class="card">
      <label>URL App Store</label>
      <input type="text" id="myUrl" placeholder="https://apps.apple.com/fr/app/mon-app/id...">
      <label>Contexte supplémentaire <span style="color:#333;font-size:10px;text-transform:none;letter-spacing:0">(optionnel)</span></label>
      <textarea id="extra" placeholder="Ex: fond sombre, cible 25-40 ans, différenciation clé, couleurs principales..."></textarea>
    </div>
  </div>

  <!-- Concurrents -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-purple">🔍</div>
      <span class="section-title">Concurrents à analyser</span>
    </div>
    <div class="card">
      <div id="clist">
        <div class="crow"><input type="text" class="cu" placeholder="https://apps.apple.com/fr/app/concurrent/id..."><button class="rm" onclick="rm(this)">×</button></div>
        <div class="crow"><input type="text" class="cu" placeholder="https://apps.apple.com/fr/app/concurrent/id..."><button class="rm" onclick="rm(this)">×</button></div>
      </div>
      <button class="add" onclick="addC()">+ Ajouter un concurrent</button>
    </div>
  </div>

  <!-- Paramètres -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-gray">⚙️</div>
      <span class="section-title">Paramètres</span>
    </div>
    <div class="card">
      <div class="r2">
        <div>
          <label>Clé API Anthropic</label>
          <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
        </div>
        <div>
          <label>Nombre de screenshots</label>
          <select id="n">
            <option value="3">3 screenshots</option>
            <option value="4" selected>4 screenshots</option>
            <option value="5">5 screenshots</option>
          </select>
        </div>
      </div>
      <button class="generate-btn" id="go">
        <span id="btn-label">Générer les screenshots</span>
      </button>
      <div id="log"></div>
    </div>
  </div>

</div>

<!-- Résultats -->
<div id="results">
  <div class="results-header">
    <div class="results-title" id="rtitle">Screenshots générés</div>
    <button class="dla" id="dla">↓ Tout télécharger</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
var svgs = [];

function log(msg, t) {
  var el = document.getElementById('log');
  el.style.display = 'block';
  var d = document.createElement('div');
  d.className = t || 'dm';
  d.textContent = (t==='ok'?'✓ ':t==='er'?'✗ ':t==='in'?'→ ':'  ') + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function addC() {
  var r = document.createElement('div');
  r.className = 'crow';
  r.innerHTML = '<input type="text" class="cu" placeholder="https://apps.apple.com/fr/app/concurrent/id..."><button class="rm" onclick="rm(this)">×</button>';
  document.getElementById('clist').appendChild(r);
}

function rm(b) {
  if (document.querySelectorAll('.crow').length > 1) b.parentElement.remove();
}

function dlSVG(i) {
  var s = svgs[i]; if (!s) return;
  var b = new Blob([s.svgContent], {type:'image/svg+xml'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'screenshot-'+(i+1)+'.svg';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function render(shots, name) {
  var g = document.getElementById('grid');
  g.innerHTML = ''; svgs = shots;
  document.getElementById('rtitle').textContent = name + ' — ' + shots.length + ' screenshots';
  shots.forEach(function(s, i) {
    var d = document.createElement('div');
    d.className = 'sc';
    d.innerHTML = '<div class="prev" id="p'+i+'"></div><div class="meta"><div class="mt">'+(s.title||'Screenshot '+(i+1))+'</div><button class="dl" data-i="'+i+'">↓ Télécharger SVG</button></div>';
    g.appendChild(d);
    setTimeout(function(x) {
      var p = document.getElementById('p'+x);
      if (shots[x] && shots[x].svgContent) p.innerHTML = shots[x].svgContent;
    }, 60, i);
  });
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior:'smooth', block:'start'});
}

function setLoading(on) {
  var btn = document.getElementById('go');
  var lbl = document.getElementById('btn-label');
  btn.disabled = on;
  if (on) {
    lbl.textContent = 'Génération en cours...';
    btn.insertAdjacentHTML('afterbegin', '<div class="spinner"></div>');
  } else {
    lbl.textContent = 'Générer les screenshots';
    var sp = btn.querySelector('.spinner');
    if (sp) sp.remove();
  }
}

document.addEventListener('DOMContentLoaded', function() {

  document.getElementById('go').addEventListener('click', async function() {
    var myUrl = document.getElementById('myUrl').value.trim();
    var extra = document.getElementById('extra').value.trim();
    var apiKey = document.getElementById('apiKey').value.trim();
    var n = parseInt(document.getElementById('n').value);
    var comps = Array.from(document.querySelectorAll('.cu')).map(function(i){return i.value.trim();}).filter(Boolean);

    document.getElementById('log').innerHTML = '';
    document.getElementById('log').style.display = 'none';
    document.getElementById('results').style.display = 'none';

    if (!myUrl) { log("Entre l'URL de ton app", 'er'); return; }
    if (!comps.length) { log('Ajoute au moins un concurrent', 'er'); return; }
    if (!apiKey) { log('Entre ta clé API Anthropic', 'er'); return; }
    if (!apiKey.startsWith('sk-ant-')) { log('Clé API invalide (doit commencer par sk-ant-)', 'er'); return; }

    setLoading(true);
    log('Analyse des apps et génération...', 'in');
    log('Patiente 30 à 60 secondes...', 'dm');

    var compList = comps.map(function(u,i){return 'Concurrent '+(i+1)+': '+u;}).join('\n');

    var prompt = 'Tu es un expert ASO senior et designer UI/UX spécialisé en screenshots App Store iOS premium.\n\nMON APP: '+myUrl+'\nCONCURRENTS:\n'+compList+(extra?'\n\nContexte: '+extra:'')+'\n\nGénère '+n+' screenshots SVG 390x844px PREMIUM pour MON APP.\n\nCHAQUE SCREENSHOT DOIT AVOIR:\n1. Un fond avec dégradé riche (linearGradient avec 2-3 stops, couleurs profondes et saturées)\n2. Des éléments décoratifs de fond (cercles semi-transparents, formes géométriques floues, lignes subtiles)\n3. Un mockup iPhone réaliste (rect 200x380 rx=28 avec écran intérieur rect rx=20, boutons latéraux, encoche) centré\n4. À l\'intérieur du mockup: une mini UI détaillée (header, cards, listes, barres de progression)\n5. Des badges/pills colorés avec texte (ex: "⚡ 32 GB libérés", "✓ Doublons détectés")\n6. Des chiffres ÉNORMES mis en avant (font-size=72 bold) quand c\'est le bénéfice principal\n7. Un CTA button bien visible (rect rx=26 avec gradient, texte bold 17px)\n8. Des étoiles de rating ou social proof sur le dernier screen\n\nSTYLE VISUEL PREMIUM:\n- Dégradés riches: ex bleu profond #0A1628 → #1a3a6e, ou violet #0D0A2E → #2D1B69\n- Accents lumineux: bleu électrique #4F9EFF, violet #A855F7, vert néon #00D084\n- Glassmorphism sur les cards: rect fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"\n- Ombres simulées avec des rects décalés semi-transparents\n- Éléments de fond: grands cercles opacity=0.05-0.1, lignes diagonales subtiles\n- Typographie: titres très bold 38-44px, sous-titres 17px opacity=0.7\n\nRÈGLES SVG TECHNIQUES:\n- viewBox="0 0 390 844"\n- Utilise <defs> avec <linearGradient> pour les fonds et boutons\n- Status bar iOS réaliste: "9:41" + icônes signal/wifi/batterie (petits rects/paths)\n- JAMAIS foreignObject, JAMAIS images externes\n- Primitives SVG uniquement: rect, circle, path, line, text, g, defs, linearGradient, radialGradient\n- Max 150 éléments par SVG\n\nSÉQUENCE NARRATIVE:\n- Screen 1: Bénéfice choc — chiffre énorme, urgence, bénéfice immédiat\n- Screen 2: Démo UX — mockup iPhone avec l\'interface principale\n- Screen 3: Feature unique — ce que les concurrents n\'ont pas\n- Screen 4: Social proof + CTA — rating, nombre users, bouton essai gratuit\n\nRéponds UNIQUEMENT en JSON valide sans markdown:\n{"screenshots":[{"title":"...","svgContent":"<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 390 844\'>...</svg>"}]}';

    try {
      var resp = await fetch('https://mute-sky-5d57.mathilde-f04.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({apiKey: apiKey, prompt: prompt})
      });

      if (!resp.ok) {
        var e = await resp.json();
        throw new Error('Erreur API: '+(e.error&&e.error.message||resp.status));
      }
      var data = await resp.json();
      var tb = data.content.find(function(b){return b.type==='text';});
      if (!tb) throw new Error('Pas de réponse texte de Claude');
      var raw = tb.text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
      var m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('Format de réponse invalide');
      var parsed = JSON.parse(m[0]);
      var shots = parsed.screenshots || [];
      if (!shots.length) throw new Error('Aucun screenshot dans la réponse');

      log(shots.length + ' screenshots générés avec succès !', 'ok');
      var appName = myUrl.match(/\/app\/([^/]+)\//)?.[1]?.replace(/-/g,' ') || 'Mon App';
      render(shots, appName);
    } catch(e) {
      log(e.message, 'er');
    }
    setLoading(false);
  });

  document.getElementById('grid').addEventListener('click', function(e) {
    if (e.target.classList.contains('dl')) dlSVG(parseInt(e.target.dataset.i));
  });

  document.getElementById('dla').addEventListener('click', function() {
    svgs.forEach(function(_,i){setTimeout(function(){dlSVG(i);},i*400);});
  });

});
</script>
</body>
</html>
